<svg fill="none" width="100%" xmlns="http://www.w3.org/2000/svg">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <style>
                .wrapper {
                    height: 100vh;
                    width: 100vw;
                    display: grid;
                    place-items: center;
                    border: 1px solid red;
                }

                .text {
                    width: 13ch;
                    animation: typing 1.5s steps(13), blink .5s step-end infinite alternate;
                    white-space: nowrap;
                    overflow: hidden;
                    border-right: 3px solid;
                    font-family: monospace;
                    font-size: 3em;
                    background: linear-gradient(90deg, rgba(0, 241, 220, 1) 0%, rgba(86, 115, 241, 1) 44%, rgba(103, 68, 241, 1) 54%, rgba(254, 0, 255, 1) 100%);
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                }

                .hand {
                    display: inline-block;
                    font-size: 2em;
                    opacity: 0;
                    animation:
                        fadeIn 0.5s ease-in-out 2s,
                        /*wave 1s cubic-bezier(0.25, 0.1, 0.25, 1) 5s;*/
                }


                @keyframes typing {
                    from {
                        width: 0
                    }
                }

                @keyframes blink {

                    from,
                    to {
                        border-color: transparent
                    }

                    50% {
                        border-color: rgba(254, 0, 255, 1);
                    }
                }

                @keyframes fadeIn {
                    from {
                        opacity: 0;
                    }

                    to {
                        opacity: 1;
                    }
                }

                /*
                @keyframes wave {
                    from {
                        transform: rotate(0deg);
                    }

                    50% {
                        transform: rotate(45deg);
                        opacity: 1;
                    }

                    to {
                        transform: rotate(0deg);
                        opacity: 1;
                    }
                }*/
            </style>
            <div class="wrapper">
                <div class="text">
                    <span>Codevault of LUKE.</span>
                </div>
            </div>
        </div>
    </foreignObject>
</svg>
