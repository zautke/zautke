<svg fill="none" width="100%" xmlns="http://www.w3.org/2000/svg">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <style>
                .wrapper {
                    display: grid;
                    place-items: left;
                }

                .hand {
                    opacity: 0;
                    transform-origin: 75% 75%;
                    animation: fadeIn .75s ease-in-out 3s forwards,
                               wave 2.0s cubic-bezier(0.25, 0.1, 0.25, 1) 1 4s;
                    white-space: nowrap;
                    overflow: hidden;
                    font-family: monospace;
                    font-size: 3em;
                }


                @keyframes fadeIn {
                    from {
                        opacity: 0;
                    }

                    to {
                        opacity: 1;
                    }
                }

                @keyframes wave {
                    0% {
                        transform: rotate(0deg);
                    }

                    15% {
                        transform: rotate(14deg);
                    }

                    30% {
                        transform: rotate(-8deg);
                    }

                    40% {
                        transform: rotate(14deg);
                    }

                    50% {
                        transform: rotate(-4deg);
                    }

                    60% {
                        transform: rotate(10deg);
                    }

                    70% {
                        transform: rotate(0deg);
                    }

                    100% {
                        transform: rotate(0deg);
                    }
                }
            </style>
            <div class="wrapper">
                <div class="hand">
                    <span>👋</span>
                </div>
            </div>
        </div>
    </foreignObject>
</svg>
